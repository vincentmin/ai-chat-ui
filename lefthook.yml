pre-commit:
  parallel: false
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm run lint --no-warn-ignored {staged_files}
    format:
      glob: "*.{ts,tsx,js,jsx,json,md,css}"
      run: pnpm run format {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm run typecheck
    ruff-check:
      glob: "*.{py,pyi}"
      run: uv run --project=agent ruff check --fix {staged_files}
    ruff-format:
      glob: "*.{py,pyi}"
      run: uv run --project=agent ruff format {staged_files}
      stage_fixed: true
    ty-check:
      glob: "*.{py,pyi}"
      run: uv run --project=agent ty check {staged_files}
    check-yaml:
      glob: "*.{yaml,yml}"
      run: npx yaml-lint {staged_files}
    check-toml:
      glob: "*.toml"
      run: npx @taplo/cli check {staged_files}
